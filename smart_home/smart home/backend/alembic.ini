[alembic]
script_location = migrations
prepend_sys_path = .
timezone =

file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations =
version_path_separator = os
recursive_version_locations = false
output_encoding = utf-8

sqlalchemy.url = mysql+pymysql://root:password@127.0.0.1:3306/smart_home?charset=utf8mb4

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
